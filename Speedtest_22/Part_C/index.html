<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part C - RGB Slider</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f2f2f2;
            padding: 40px;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .color-box {
            height: 300px;
            border: 2px solid #ccc;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .sliders {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        input[type="range"] {
            width: 100%;
            appearance: none;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            background: #1e73d8;
            border-radius: 50%;
            cursor: pointer;
        }

        .label {
            text-align: left;
            margin-bottom: 5px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .color-box {
                height: 200px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="color-box" id="colorBox">
            rgba(255, 117, 0, 0.8)
        </div>

        <div class="sliders">

            <div>
                <div class="label">Red (0-255)</div>
                <input type="range" id="red" min="0" max="255" value="255">
            </div>

            <div>
                <div class="label">Green (0-255)</div>
                <input type="range" id="green" min="0" max="255" value="117">
            </div>

            <div>
                <div class="label">Blue (0-255)</div>
                <input type="range" id="blue" min="0" max="255" value="0">
            </div>

            <div>
                <div class="label">Alpha (0-1)</div>
                <input type="range" id="alpha" min="0" max="1" step="0.01" value="0.8">
            </div>

        </div>

    </div>

    <script>

        const red = document.getElementById("red");
        const green = document.getElementById("green");
        const blue = document.getElementById("blue");
        const alpha = document.getElementById("alpha");
        const colorBox = document.getElementById("colorBox");

        function updateSliderBackground(slider, color) {
            const min = slider.min ? slider.min : 0;
            const max = slider.max ? slider.max : 100;
            const value = slider.value;

            const percentage = ((value - min) / (max - min)) * 100;

            slider.style.background = `linear-gradient(to right, ${color} ${percentage}%, #ddd ${percentage}%)`;
        }


        function updateColor() {
            const r = red.value;
            const g = green.value;
            const b = blue.value;
            const a = alpha.value;

            const rgbaValue = `rgba(${r}, ${g}, ${b}, ${a})`;

            colorBox.style.backgroundColor = rgbaValue;
            colorBox.textContent = rgbaValue;

            // Update track colors
            updateSliderBackground(red, "red");
            updateSliderBackground(green, "green");
            updateSliderBackground(blue, "blue");
            updateSliderBackground(alpha, "#1e73d8");
        }


        red.addEventListener("input", updateColor);
        green.addEventListener("input", updateColor);
        blue.addEventListener("input", updateColor);
        alpha.addEventListener("input", updateColor);

        // Initial load
        updateColor();

    </script>

</body>

</html>
