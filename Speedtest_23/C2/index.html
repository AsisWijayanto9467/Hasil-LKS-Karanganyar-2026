<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Split Image</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .controls input {
            width: 60px;
            padding: 5px;
        }

        button {
            padding: 8px 15px;
            cursor: pointer;
        }

        .info {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
        }

        .grid {
            display: grid;
            gap: 2px;
            background: #333;
            padding: 2px;
        }

        .card {
            aspect-ratio: 1;
            cursor: pointer;
            background-size: cover;
        }

        .card.removing {
            animation: fade 0.5s forwards;
        }

        @keyframes fade {
            to {
                opacity: 0;
                transform: scale(0);
            }
        }
    </style>
</head>

<body>
    <h3>Split Image</h3>

    <div class="controls">
        <label>X: <input type="number" id="x" min="1" value="5"></label>
        <label>Y: <input type="number" id="y" min="1" value="3"></label>
        <button onclick="split()">Split Image</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div class="info">
        X: <span id="xVal">5</span> | Y: <span id="yVal">3</span> |
        Total: <span id="total">15</span>
    </div>

    <div class="grid" id="grid"></div>
    <div id="counter" style="margin-top: 10px; font-weight: bold;">Sisa: 15</div>

    <script>
        let x = 5, y = 3;
        const img = 'https://picsum.photos/600/600?random=1'; // Random image

        function updateDisplay() {
            document.getElementById('xVal').textContent = x;
            document.getElementById('yVal').textContent = y;
            document.getElementById('total').textContent = x * y;
        }

        function create() {
            const grid = document.getElementById('grid');
            grid.style.gridTemplateColumns = `repeat(${x}, 1fr)`;

            let html = '';
            for (let r = 0; r < y; r++) {
                for (let c = 0; c < x; c++) {
                    html += `<div class="card" style="background-image: url(${img}); background-position: ${c * (100 / x)}% ${r * (100 / y)}%; background-size: ${x * 100}% ${y * 100}%;" onclick="remove(this)"></div>`;
                }
            }
            grid.innerHTML = html;
            document.getElementById('counter').textContent = `Sisa: ${x * y}`;
        }

        function remove(card) {
            if (card.classList.contains('removing')) return;
            card.classList.add('removing');
            setTimeout(() => {
                card.remove();
                document.getElementById('counter').textContent = `Sisa: ${document.querySelectorAll('.card:not(.removing)').length}`;
            }, 500);
        }

        function split() {
            x = Math.min(10, Math.max(1, parseInt(document.getElementById('x').value) || 5));
            y = Math.min(10, Math.max(1, parseInt(document.getElementById('y').value) || 3));
            document.getElementById('x').value = x;
            document.getElementById('y').value = y;
            updateDisplay();
            create();
        }

        function reset() { create(); }

        create(); // Init
    </script>
</body>

</html>
