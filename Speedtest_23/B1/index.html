<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading Animation</title>
<style>
body {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f2f2f2;
}

.loader-box {
    width:100px;
    height:100px;
    background:#1d1f3a;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

.bar {
    width:6px;
    height:40px;
    background:#3dd5f3;
    animation: bounce 1s infinite ease-in-out;
}

.bar:nth-child(1) { animation-delay: 0s; }
.bar:nth-child(2) { animation-delay: 0.2s; }
.bar:nth-child(3) { animation-delay: 0.4s; }
.bar:nth-child(4) { animation-delay: 0.6s; }

@keyframes bounce {
    0%, 100% {
        transform: scaleY(0.5);
    }
    50% {
        transform: scaleY(1.5);
    }
}
</style>
</head>
<body>

<div class="loader-box">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
</div>

</body>
</html>
