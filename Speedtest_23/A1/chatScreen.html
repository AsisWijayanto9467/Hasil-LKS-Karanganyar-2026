<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Messenger - Chat</title>
<style>
body {
    background:#e5e5e5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial, sans-serif;
}

.phone {
    width:360px;
    height:640px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
}

.header {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.header-left {
    display:flex;
    align-items:center;
}

.avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    margin-right:10px;
}

.messages {
    flex:1;
    padding:10px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
}

.message {
    padding:8px 12px;
    border-radius:15px;
    margin:5px 0;
    max-width:70%;
}

.received {
    background:#f1f0f0;
    align-self:flex-start;
}

.sent {
    background:#0084ff;
    color:white;
    align-self:flex-end;
}

.input-area {
    display:flex;
    padding:10px;
    border-top:1px solid #ddd;
}

input {
    flex:1;
    padding:8px;
    border-radius:20px;
    border:1px solid #ccc;
}

button {
    margin-left:8px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    background:#0084ff;
    color:white;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="phone">
    <div class="header">
        <div class="header-left">
            <img src="https://i.pravatar.cc/100?img=1" class="avatar">
            <strong>John Doe</strong>
        </div>
        <div>⋮</div>
    </div>

    <div class="messages">
        <div class="message received">Hello!</div>
        <div class="message sent">Hi, how are you?</div>
        <div class="message received">I'm good, thanks!</div>
    </div>

    <div class="input-area">
        <input type="text" placeholder="Type a message...">
        <button>Send</button>
    </div>
</div>

</body>
</html>
